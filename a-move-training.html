<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>走 A 训练 - 指令落点实验室</title>
    <link rel="stylesheet" href="./a-move-training.css" />
  </head>
  <body>
    <main class="amove-shell">
      <section class="amove-lab">
        <header class="lab-header">
          <div>
            <div class="module-nav">
              <a class="back-link" href="./index.html">返回功能台</a>
              <p class="eyebrow">RTS Attack Move</p>
            </div>
            <h1>走 A 训练</h1>
          </div>
          <div class="lab-actions">
            <button id="amoveStartButton" class="primary-button" type="button">开始训练</button>
            <button id="amoveChallengeButton" class="challenge-button" type="button">30秒挑战</button>
            <button id="amoveFullscreenButton" class="icon-button fullscreen-button" type="button" aria-label="点击区域全屏" title="点击区域全屏">⛶</button>
            <button id="amoveStopButton" class="icon-button stop-button" type="button" aria-label="结束训练" title="结束训练">■</button>
          </div>
        </header>

        <div class="metric-strip" aria-live="polite">
          <article>
            <span>成功</span>
            <strong id="amoveHitMetric">0</strong>
          </article>
          <article>
            <span>准确率</span>
            <strong id="amoveAccuracyMetric">--</strong>
          </article>
          <article>
            <span>A 后命中</span>
            <strong id="amoveAcquireMetric">--</strong>
          </article>
          <article>
            <span>失误</span>
            <strong id="amoveMissMetric">0</strong>
          </article>
          <article>
            <span>阶段</span>
            <strong id="amovePhaseMetric">待开始</strong>
          </article>
          <article>
            <span>挑战剩余</span>
            <strong id="amoveTimeMetric">--</strong>
          </article>
        </div>

        <div id="amoveArena" class="amove-arena" tabindex="0" aria-label="走 A 训练区域">
          <div class="arena-grid"></div>
          <div id="amoveTargetLayer" class="target-layer"></div>
          <div id="amoveMessage" class="arena-message">
            <strong id="amoveInstructionTitle">右键绿色点，按 A，再点移动红靶。</strong>
            <span>绿色点不会移动；红靶混在移动白靶里。没有按 A 前点红靶不算成功。</span>
          </div>
        </div>
      </section>

      <aside class="amove-side">
        <section class="panel">
          <div class="panel-heading">
            <h2>训练设置</h2>
            <span id="amoveState" class="state-pill">待开始</span>
          </div>
          <label class="field">
            <span>目标大小 <strong id="amoveSizeOutput">38px</strong></span>
            <input id="amoveSizeInput" type="range" min="22" max="70" step="1" value="38" />
          </label>
          <label class="field">
            <span>白色干扰靶 <strong id="amoveWhiteCountOutput">5</strong></span>
            <input id="amoveWhiteCountInput" type="range" min="2" max="12" step="1" value="5" />
          </label>
          <label class="field">
            <span>移动速度 <strong id="amoveSpeedOutput">220px/s</strong></span>
            <input id="amoveSpeedInput" type="range" min="40" max="760" step="10" value="220" />
          </label>
          <label class="field">
            <span>移动范围 <strong id="amoveMoveRangeOutput">160px</strong></span>
            <input id="amoveMoveRangeInput" type="range" min="40" max="440" step="10" value="160" />
          </label>
          <label class="field">
            <span>出现区域 <strong id="amoveAreaOutput">90%</strong></span>
            <input id="amoveAreaInput" type="range" min="35" max="100" step="5" value="90" />
          </label>
          <label class="field">
            <span>绿色点触发方式</span>
            <select id="amoveAnchorButtonInput">
              <option value="right" selected>右键点击</option>
              <option value="left">左键点击</option>
            </select>
          </label>
          <label class="toggle-field">
            <input id="amoveHitSoundInput" type="checkbox" />
            <span>
              <strong>点击音频</strong>
              <small>完成走 A 命中时播放短提示音。</small>
            </span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>本次结果</h2>
          </div>
          <dl class="result-grid">
            <div><dt>成功</dt><dd id="amoveResultHits">--</dd></div>
            <div><dt>失误</dt><dd id="amoveResultMisses">--</dd></div>
            <div><dt>准确率</dt><dd id="amoveResultAccuracy">--</dd></div>
            <div><dt>A 后命中</dt><dd id="amoveResultAcquire">--</dd></div>
            <div><dt id="amoveResultPrimeLabel">右键到 A</dt><dd id="amoveResultPrime">--</dd></div>
            <div><dt>完整回合</dt><dd id="amoveResultRound">--</dd></div>
            <div><dt>正确点击速</dt><dd id="amoveResultRate">--</dd></div>
          </dl>
        </section>

        <section class="panel">
          <div class="panel-heading"><h2>挑战纪录</h2></div>
          <div id="amoveBestRecord" class="best-record">本机最佳：--</div>
        </section>

        <section class="panel">
          <div class="panel-heading"><h2>训练总结</h2></div>
          <div id="amoveSummary" class="summary">练习绿点定点、A 键武装和红白目标选择之间的节奏衔接。</div>
        </section>
      </aside>
    </main>
    <script src="./challenge-records.js"></script>
    <script src="./a-move-training.js"></script>
  </body>
</html>
