<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>框选练习 - 指令落点实验室</title>
    <link rel="stylesheet" href="./box-select-training.css" />
  </head>
  <body>
    <main class="select-shell">
      <section class="select-lab">
        <header class="lab-header">
          <div>
            <div class="module-nav">
              <a class="back-link" href="./index.html">返回功能台</a>
              <p class="eyebrow">RTS Box Select</p>
            </div>
            <h1>框选练习</h1>
          </div>
          <div class="lab-actions">
            <button id="selectStartButton" class="primary-button" type="button">开始训练</button>
            <button id="selectChallengeButton" class="challenge-button" type="button">30秒挑战</button>
            <button id="selectFullscreenButton" class="icon-button fullscreen-button" type="button" aria-label="点击区域全屏" title="点击区域全屏">⛶</button>
            <button id="selectStopButton" class="icon-button stop-button" type="button" aria-label="结束训练" title="结束训练">■</button>
          </div>
        </header>

        <div class="metric-strip" aria-live="polite">
          <article>
            <span>成功回合</span>
            <strong id="selectHitMetric">0</strong>
          </article>
          <article>
            <span>框选成功率</span>
            <strong id="selectBoxMetric">--</strong>
          </article>
          <article>
            <span>方向顺势</span>
            <strong id="selectDirectionMetric">--</strong>
          </article>
          <article>
            <span>路径效率</span>
            <strong id="selectPathMetric">--</strong>
          </article>
          <article>
            <span>挑战剩余</span>
            <strong id="selectTimeMetric">--</strong>
          </article>
        </div>

        <div id="selectArena" class="select-arena" tabindex="0" aria-label="框选练习区域">
          <div class="arena-grid"></div>
          <div id="selectRoundLayer" class="round-layer"></div>
          <div id="selectBox" class="selection-box" hidden></div>
          <div id="selectMessage" class="arena-message">
            <strong>先框住全部绿点，再点红点。</strong>
            <span>从绿点群朝红点方向拖框，释放后到红点的移动越直接，后续指令越省。</span>
          </div>
        </div>
      </section>

      <aside class="select-side">
        <section class="panel">
          <div class="panel-heading">
            <h2>训练设置</h2>
            <span id="selectState" class="state-pill">待开始</span>
          </div>
          <label class="field">
            <span>绿色标靶数 <strong id="selectCountOutput">3</strong></span>
            <input id="selectCountInput" type="range" min="3" max="10" step="1" value="3" />
          </label>
          <label class="field">
            <span>标靶大小 <strong id="selectSizeOutput">34px</strong></span>
            <input id="selectSizeInput" type="range" min="20" max="66" step="1" value="34" />
          </label>
          <label class="field">
            <span>绿点分散度 <strong id="selectSpreadOutput">240px</strong></span>
            <input id="selectSpreadInput" type="range" min="70" max="640" step="10" value="240" />
          </label>
          <label class="field">
            <span>红点距离 <strong id="selectRedDistanceOutput">360px</strong></span>
            <input id="selectRedDistanceInput" type="range" min="90" max="900" step="10" value="360" />
          </label>
          <label class="field">
            <span>出现区域 <strong id="selectAreaOutput">88%</strong></span>
            <input id="selectAreaInput" type="range" min="40" max="100" step="4" value="88" />
          </label>
          <label class="toggle-field">
            <input id="selectHitSoundInput" type="checkbox" />
            <span>
              <strong>点击音频</strong>
              <small>完成红点点击时播放短提示音。</small>
            </span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>本次结果</h2>
          </div>
          <dl class="result-grid">
            <div><dt>成功回合</dt><dd id="selectResultHits">--</dd></div>
            <div><dt>失误</dt><dd id="selectResultMisses">--</dd></div>
            <div><dt>框选成功率</dt><dd id="selectResultBox">--</dd></div>
            <div><dt>平均完成</dt><dd id="selectResultAverage">--</dd></div>
            <div><dt>方向顺势</dt><dd id="selectResultDirection">--</dd></div>
            <div><dt>路径效率</dt><dd id="selectResultPath">--</dd></div>
            <div><dt>正确回合速</dt><dd id="selectResultRate">--</dd></div>
          </dl>
        </section>

        <section class="panel">
          <div class="panel-heading"><h2>挑战纪录</h2></div>
          <div id="selectBestRecord" class="best-record">本机最佳：--</div>
        </section>

        <section class="panel">
          <div class="panel-heading"><h2>训练总结</h2></div>
          <div id="selectSummary" class="summary">框选释放点接近红点一侧，能减少回头路和二次找点。</div>
        </section>
      </aside>
    </main>
    <script src="./challenge-records.js"></script>
    <script src="./box-select-training.js"></script>
  </body>
</html>
