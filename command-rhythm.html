<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>连续指令节奏 - 指令落点实验室</title>
    <link rel="stylesheet" href="./command-rhythm.css" />
    <link rel="stylesheet" href="./click-buttons.css" />
  </head>
  <body>
    <main class="rhythm-shell">
      <section class="rhythm-lab">
        <header class="lab-header">
          <div>
            <div class="module-nav">
              <a class="back-link" href="./index.html">返回功能台</a>
              <p class="eyebrow">RTS / MOBA Command Rhythm</p>
            </div>
            <h1>连续指令节奏</h1>
          </div>
          <div class="lab-actions">
            <button id="rhythmStartButton" class="primary-button" type="button">开始训练</button>
            <button id="rhythmFullscreenButton" class="icon-button fullscreen-button" type="button" aria-label="点击区域全屏" title="点击区域全屏">⛶</button>
            <button id="rhythmStopButton" class="icon-button stop-button" type="button" aria-label="结束训练" title="结束训练">■</button>
          </div>
        </header>

        <div class="metric-strip" aria-live="polite">
          <article>
            <span>轮次</span>
            <strong id="roundMetric">0 / 10</strong>
          </article>
          <article>
            <span>本轮连点</span>
            <strong id="chainMetric">0 / 6</strong>
          </article>
          <article>
            <span>命中率</span>
            <strong id="hitMetric">--</strong>
          </article>
          <article>
            <span>平均点击</span>
            <strong id="acquireMetric">--</strong>
          </article>
          <article>
            <span>节奏波动</span>
            <strong id="rhythmMetric">--</strong>
          </article>
        </div>

        <div id="rhythmArena" class="rhythm-arena" tabindex="0" aria-label="连续指令训练区域">
          <div class="arena-grid"></div>
          <div id="rhythmTargetLayer" class="target-layer"></div>
          <div id="rhythmPulse" class="rhythm-pulse" hidden></div>
          <div id="rhythmMessage" class="arena-message">
            <strong>连续点掉每一轮的目标。</strong>
            <span>新的目标会在命中后立即出现。稳住命中率，再看连点节奏是否均匀。</span>
          </div>
        </div>
      </section>

      <aside class="rhythm-side">
        <section class="panel">
          <div class="panel-heading">
            <h2>训练设置</h2>
            <span id="rhythmState" class="state-pill">待开始</span>
          </div>

          <label class="field">
            <span>训练轮数 <strong id="roundsOutput">10</strong></span>
            <input id="roundsInput" type="range" min="4" max="24" step="2" value="10" />
          </label>
          <label class="field">
            <span>每轮指令数 <strong id="chainOutput">6</strong></span>
            <input id="chainInput" type="range" min="3" max="12" step="1" value="6" />
          </label>
          <label class="field">
            <span>目标尺寸 <strong id="rhythmSizeOutput">38px</strong></span>
            <input id="rhythmSizeInput" type="range" min="24" max="72" step="1" value="38" />
          </label>
          <label class="field">
            <span>出现区域范围 <strong id="rhythmRangeOutput">90%</strong></span>
            <input id="rhythmRangeInput" type="range" min="35" max="100" step="5" value="90" />
          </label>
          <label class="field">
            <span>命中按键</span>
            <select id="rhythmClickButtonInput">
              <option value="left">左键</option>
              <option value="right">右键</option>
              <option value="both">左右都可</option>
            </select>
          </label>
          <label class="toggle-field">
            <input id="showPulseInput" type="checkbox" checked />
            <span>
              <strong>显示命中反馈</strong>
              <small>点中后短暂显示上一个指令落点。</small>
            </span>
          </label>
          <label class="toggle-field">
            <input id="hitSoundInput" type="checkbox" />
            <span>
              <strong>命中音效</strong>
              <small>点中目标时播放短提示音。</small>
            </span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>本轮结果</h2>
          </div>
          <dl class="round-detail">
            <div>
              <dt>完成耗时</dt>
              <dd id="roundTimeValue">--</dd>
            </div>
            <div>
              <dt>平均点击</dt>
              <dd id="roundAverageValue">--</dd>
            </div>
            <div>
              <dt>失误</dt>
              <dd id="roundMissValue">--</dd>
            </div>
            <div>
              <dt>节奏波动</dt>
              <dd id="roundSpreadValue">--</dd>
            </div>
          </dl>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>训练总结</h2>
          </div>
          <div id="rhythmSummary" class="summary">
            完成一组训练后，这里会比较点击速度、命中率和节奏稳定性。
          </div>
        </section>

        <section class="panel history-panel">
          <div class="panel-heading">
            <h2>最近记录</h2>
            <button id="clearRhythmHistoryButton" class="ghost-button" type="button">清空</button>
          </div>
          <ol id="rhythmHistoryList" class="history-list"></ol>
        </section>
      </aside>
    </main>
    <script src="./click-buttons.js"></script>
    <script src="./command-rhythm.js"></script>
  </body>
</html>
